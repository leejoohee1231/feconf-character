<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>안내</title>
    <link rel="stylesheet" href="guide.css" />
  </head>
  <body>
    <div id="card">
      <header>
        <div class="head-left">
          <span class="paw">🐾</span>
          <div>
            <div id="title">컨퍼런스 안내</div>
            <div id="subtitle">오늘의 세션</div>
          </div>
        </div>
        <div class="head-right">
          <span id="clock">--:--</span>
          <button id="close" title="닫기">✕</button>
        </div>
      </header>

      <div id="content"><!-- phase 별로 채워짐 --></div>

      <footer><span id="footer-text">마스코트를 다시 클릭하면 닫혀요</span></footer>
    </div>
    <script src="guide.js"></script>
  </body>
</html>
