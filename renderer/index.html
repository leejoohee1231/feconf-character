<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mascot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="stage">
      <!-- 말풍선 (알림) -->
      <div id="bubble" class="hidden">
        <div id="bubble-title"></div>
        <div id="bubble-msg"></div>
      </div>

      <!-- DND 표시 -->
      <div id="dnd-badge" class="hidden">🔕</div>

      <!-- 캐릭터 (업로드된 달팽이 SVG 그대로) -->
      <div id="char">
        <div id="fx" class="hidden"></div>
        <img id="cat" src="snail.svg" alt="달팽이 마스코트" draggable="false" />
      </div>

      <!-- 그림자 -->
      <div id="shadow"></div>
    </div>
    <script src="mascot.js"></script>
  </body>
</html>
