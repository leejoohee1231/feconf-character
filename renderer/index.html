<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mascot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="stage">
      <!-- 말풍선 (알림) — 업로드된 SVG 모양, 텍스트는 Gulim 으로 오버레이 -->
      <div id="bubble" class="hidden">
        <svg id="bubble-shape" viewBox="0 0 279 214" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path class="bubble-body" d="M139.607 0.560547C216.375 0.560716 278.607 40.4073 278.607 89.5605C278.607 138.714 216.375 178.56 139.607 178.561C123.668 178.561 108.356 176.841 94.0967 173.679C90.2321 180.736 78.7061 185.857 65.0859 185.857C48.299 185.857 34.6904 178.079 34.6904 168.483C34.6904 163.118 38.9445 158.322 45.6299 155.135C17.9553 138.866 0.607476 115.512 0.607422 89.5605C0.607422 40.4072 62.8398 0.560547 139.607 0.560547Z"/>
          <path class="bubble-dot" d="M32.3311 186.357C38.7008 186.357 44.4433 187.869 48.5762 190.287C52.7211 192.712 55.1621 195.99 55.1621 199.509C55.1619 203.027 52.7209 206.304 48.5762 208.729C44.4433 211.148 38.7009 212.659 32.3311 212.659C25.9613 212.659 20.2188 211.148 16.0859 208.729C11.9413 206.304 9.50016 203.027 9.5 199.509C9.5 195.99 11.9411 192.712 16.0859 190.287C20.2188 187.869 25.9613 186.357 32.3311 186.357Z"/>
        </svg>
        <div id="bubble-text">
          <div id="bubble-title"></div>
          <div id="bubble-msg"></div>
        </div>
      </div>

      <!-- 클릭 팝업 — 같은 Frame1 말풍선 모양 + D-day/디스코드 (창 안이라 드래그 시 함께 이동) -->
      <div id="click-bubble" class="hidden">
        <svg class="bubble-shape" viewBox="0 0 279 214" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path class="bubble-body" d="M139.607 0.560547C216.375 0.560716 278.607 40.4073 278.607 89.5605C278.607 138.714 216.375 178.56 139.607 178.561C123.668 178.561 108.356 176.841 94.0967 173.679C90.2321 180.736 78.7061 185.857 65.0859 185.857C48.299 185.857 34.6904 178.079 34.6904 168.483C34.6904 163.118 38.9445 158.322 45.6299 155.135C17.9553 138.866 0.607476 115.512 0.607422 89.5605C0.607422 40.4072 62.8398 0.560547 139.607 0.560547Z"/>
          <path class="bubble-dot" d="M32.3311 186.357C38.7008 186.357 44.4433 187.869 48.5762 190.287C52.7211 192.712 55.1621 195.99 55.1621 199.509C55.1619 203.027 52.7209 206.304 48.5762 208.729C44.4433 211.148 38.7009 212.659 32.3311 212.659C25.9613 212.659 20.2188 211.148 16.0859 208.729C11.9413 206.304 9.50016 203.027 9.5 199.509C9.5 195.99 11.9411 192.712 16.0859 190.287C20.2188 187.869 25.9613 186.357 32.3311 186.357Z"/>
        </svg>
        <div id="click-content">
          <div id="cb-label">행사까지</div>
          <div id="cb-dday">D-–</div>
          <button id="cb-discord">디스코드 바로가기</button>
        </div>
      </div>

      <!-- DND 표시 -->
      <div id="dnd-badge" class="hidden">🔕</div>

      <!-- 캐릭터 (업로드된 달팽이 SVG 그대로) -->
      <div id="char">
        <div id="fx" class="hidden"></div>
        <img id="cat" src="snail.svg" alt="달팽이 마스코트" draggable="false" />
      </div>

      <!-- 그림자 -->
      <div id="shadow"></div>
    </div>
    <script src="mascot.js"></script>
  </body>
</html>
